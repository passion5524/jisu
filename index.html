<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단항식 마스터! 타임어택</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            touch-action: manipulation; 
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .math-expr { font-family: 'Times New Roman', serif; font-style: italic; }
        sup { font-size: 0.6em; margin-left: 1px; vertical-align: super; font-style: normal; }
        
        .q-text { font-size: 2.2rem; }
        @media (min-height: 700px) {
            .q-text { font-size: 2.8rem; }
        }
        
        .progress-bar { transition: width 0.1s linear; }
        .tap-effect:active { transform: scale(0.95); }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.15s ease-in-out 0s 2; }
        
        .score-up { color: #22c55e; transform: scale(1.1); transition: 0.2s; }
        .score-down { color: #ef4444; transform: scale(0.9); transition: 0.2s; }

        .op-box {
            display: inline-block;
            padding: 0 10px;
            color: #64748b;
            font-weight: bold;
        }

        /* Custom Scrollbar for Ranking */
        .ranking-list::-webkit-scrollbar {
            width: 4px;
        }
        .ranking-list::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .ranking-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-2 sm:p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200 flex flex-col">
        <!-- Start Screen -->
        <div id="start-screen" class="p-8 text-center">
            <div class="mb-6 inline-block p-6 bg-indigo-100 rounded-3xl">
                <div class="math-expr text-indigo-600 text-4xl font-bold">
                    (2x<sup>2</sup>)<sup>3</sup> ÷ 4x
                </div>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">단항식 마스터</h1>
            <p class="text-slate-500 mb-6 font-medium">지수법칙과 단항식 계산!<br><span class="text-indigo-600">정답 +100</span> | <span class="text-red-500 font-bold">오답 -150</span></p>
            
            <button onclick="startGame()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl text-xl font-bold shadow-lg hover:bg-indigo-700 tap-effect mb-4">
                게임 시작
            </button>
            <button onclick="showRanking()" class="w-full py-3 bg-slate-100 text-slate-600 rounded-2xl text-lg font-bold hover:bg-slate-200 tap-effect">
                랭킹 보기
            </button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden p-4 sm:p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4">
                <div class="text-lg font-bold text-slate-700">점수: <span id="score">0</span></div>
                <div class="text-lg font-bold text-orange-600">시간: <span id="timer">50</span>s</div>
            </div>
            
            <div class="w-full bg-slate-200 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress" class="progress-bar h-full bg-orange-500" style="width: 100%"></div>
            </div>

            <div class="text-center mb-6 p-6 bg-slate-50 rounded-2xl border-2 border-slate-100 flex-grow flex flex-col justify-center">
                <div class="text-slate-400 text-xs mb-4 font-medium uppercase tracking-wider">Calculate the Monomial</div>
                <div id="question-area" class="math-expr font-bold text-slate-800 q-text leading-tight"></div>
            </div>

            <div id="options-grid" class="grid grid-cols-2 gap-3 mb-2"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden p-8 text-center">
            <h2 class="text-2xl font-bold text-slate-800 mb-4" id="result-title">최종 결과</h2>
            <div class="text-6xl font-black text-indigo-600 mb-2" id="final-score">0</div>
            <p class="text-slate-500 mb-6 font-medium text-lg">점 획득</p>
            
            <div id="feedback" class="mb-6 p-4 rounded-2xl text-sm leading-relaxed font-bold"></div>

            <div id="ranking-input-area" class="mb-6">
                <input type="text" id="nickname" maxlength="8" placeholder="닉네임 입력 (최대 8자)" class="w-full p-4 border-2 border-slate-200 rounded-2xl mb-3 text-center text-lg focus:border-indigo-500 outline-none">
                <button onclick="saveScore()" id="save-btn" class="w-full py-3 bg-indigo-500 text-white rounded-2xl font-bold hover:bg-indigo-600 tap-effect">
                    랭킹 등록하기
                </button>
            </div>

            <button onclick="startGame()" class="w-full py-4 bg-slate-800 text-white rounded-2xl text-xl font-bold shadow-lg hover:bg-slate-900 tap-effect">
                다시 도전하기
            </button>
        </div>

        <!-- Ranking Screen -->
        <div id="ranking-screen" class="hidden p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">TOP 10 랭킹</h2>
                <button onclick="adminReset()" class="text-slate-300 hover:text-slate-400 text-xs">관리</button>
            </div>
            
            <div id="ranking-list" class="ranking-list flex-grow overflow-y-auto mb-6 space-y-2 pr-1">
                <!-- Ranking items here -->
            </div>

            <button onclick="showScreen('start')" class="w-full py-4 bg-slate-800 text-white rounded-2xl text-xl font-bold tap-effect">
                메인으로
            </button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 50;
        let timerInterval;
        let currentAnswer = "";
        let isProcessing = false;

        // 비속어 필터링 리스트 (확장 가능)
        const badWords = ["바보", "멍청이", "시발", "개새", "끼", "니미", "미친", "지랄", "좆", "븅신"];

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen'),
            ranking: document.getElementById('ranking-screen')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        function updateScoreUI(type) {
            const scoreEl = document.getElementById('score');
            scoreEl.innerText = score;
            const animationClass = type === 'up' ? 'score-up' : 'score-down';
            scoreEl.classList.add(animationClass);
            setTimeout(() => scoreEl.classList.remove(animationClass), 200);
        }

        function formatMonomial(coeff, expX, expY = 0) {
            let res = "";
            if (coeff === 1) {
                if (expX === 0 && expY === 0) res = "1";
            } else if (coeff === -1) {
                res = "-";
                if (expX === 0 && expY === 0) res = "-1";
            } else {
                res = coeff.toString();
            }

            if (expX > 0) {
                res += "x";
                if (expX > 1) res += `<sup>${expX}</sup>`;
            }
            if (expY > 0) {
                res += "y";
                if (expY > 1) res += `<sup>${expY}</sup>`;
            }
            return res;
        }

        function startGame() {
            score = 0;
            timeLeft = 50;
            isProcessing = false;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('nickname').value = "";
            document.getElementById('save-btn').disabled = false;
            document.getElementById('save-btn').innerText = "랭킹 등록하기";
            document.getElementById('save-btn').className = "w-full py-3 bg-indigo-500 text-white rounded-2xl font-bold hover:bg-indigo-600 tap-effect";
            
            showScreen('game');
            nextQuestion();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame();
                }
                document.getElementById('timer').innerText = Math.max(0, Math.ceil(timeLeft));
                document.getElementById('progress').style.width = (timeLeft / 50 * 100) + "%";
            }, 100);
        }

        function generateQuestion() {
            const level = Math.floor(score / 350); 
            const useY = level >= 1;
            
            let qHtml = "";
            let ans = { c: 1, x: 0, y: 0 };
            const type = level < 1 ? Math.floor(Math.random() * 2) : Math.floor(Math.random() * 3);

            if (type === 0) {
                let c1 = (Math.floor(Math.random() * 6) + 1) * (Math.random() > 0.5 ? 1 : -1);
                let x1 = Math.floor(Math.random() * 3) + 1;
                let y1 = useY ? Math.floor(Math.random() * 3) : 0;
                let c2 = Math.floor(Math.random() * 4) + 1;
                let x2 = Math.floor(Math.random() * 3) + 1;
                let y2 = useY ? Math.floor(Math.random() * 3) : 0;
                qHtml = `${formatMonomial(c1, x1, y1)} <span class="op-box">×</span> ${formatMonomial(c2, x2, y2)}`;
                ans = { c: c1 * c2, x: x1 + x2, y: y1 + y2 };
            } 
            else if (type === 1) {
                let c2 = Math.floor(Math.random() * 4) + 1;
                let x2 = Math.floor(Math.random() * 3) + 1;
                let y2 = useY ? Math.floor(Math.random() * 2) : 0;
                let resC = (Math.floor(Math.random() * 4) + 1) * (Math.random() > 0.5 ? 1 : -1);
                let resX = Math.floor(Math.random() * 3);
                let resY = useY ? Math.floor(Math.random() * 2) : 0;
                let c1 = c2 * resC;
                let x1 = x2 + resX;
                let y1 = y2 + resY;
                qHtml = `${formatMonomial(c1, x1, y1)} <span class="op-box">÷</span> ${formatMonomial(c2, x2, y2)}`;
                ans = { c: resC, x: resX, y: resY };
            }
            else {
                let c = Math.floor(Math.random() * 3) + 2; 
                let x = Math.floor(Math.random() * 3) + 1;
                let y = useY ? Math.floor(Math.random() * 2) + 1 : 0;
                let p = Math.floor(Math.random() * 2) + 2; 
                qHtml = `(${formatMonomial(c, x, y)})<sup>${p}</sup>`;
                ans = { c: Math.pow(c, p), x: x * p, y: y * p };
            }

            const correctKey = `${ans.c},${ans.x},${ans.y}`;
            let options = [{ key: correctKey, html: formatMonomial(ans.c, ans.x, ans.y) }];
            let optionKeys = new Set([correctKey]);

            while (options.length < 4) {
                let fc = ans.c;
                let fx = ans.x;
                let fy = ans.y;
                const roll = Math.random();
                if (roll < 0.3) {
                    fx = Math.max(0, ans.x + (Math.random() > 0.5 ? 1 : -1));
                    if (useY) fy = Math.max(0, ans.y + (Math.random() > 0.5 ? 1 : -1));
                } else if (roll < 0.6) {
                    fc = -ans.c;
                } else if (roll < 0.8) {
                    fc = ans.c + (Math.floor(Math.random() * 3) + 1) * (Math.random() > 0.5 ? 1 : -1);
                    fx = Math.max(0, ans.x + 1);
                } else {
                    fx = ans.x + 2;
                    fc = ans.c;
                }
                if (fc === 0) fc = 3;
                let fKey = `${fc},${fx},${fy}`;
                if (!optionKeys.has(fKey)) {
                    optionKeys.add(fKey);
                    options.push({ key: fKey, html: formatMonomial(fc, fx, fy) });
                }
            }
            return { qHtml: qHtml, answerKey: correctKey, options: options.sort(() => Math.random() - 0.5) };
        }

        function nextQuestion() {
            isProcessing = false;
            const q = generateQuestion();
            currentAnswer = q.answerKey;
            document.getElementById('question-area').innerHTML = q.qHtml;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 px-2 bg-white border-2 border-slate-200 rounded-2xl flex justify-center items-center gap-1 hover:border-indigo-400 hover:bg-indigo-50 tap-effect transition-all h-20 text-xl font-bold text-slate-700 math-expr";
                btn.innerHTML = opt.html;
                btn.onclick = () => checkAnswer(opt.key, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selectedKey, btn) {
            if (isProcessing) return;
            if (selectedKey === currentAnswer) {
                isProcessing = true;
                score += 100;
                updateScoreUI('up');
                btn.classList.replace('border-slate-200', 'border-green-500');
                btn.classList.add('bg-green-50', 'text-green-700');
                setTimeout(nextQuestion, 200);
            } else {
                score = Math.max(0, score - 150);
                updateScoreUI('down');
                btn.classList.replace('border-slate-200', 'border-red-500');
                btn.classList.add('bg-red-50', 'text-red-700', 'shake');
                setTimeout(() => { btn.classList.remove('shake'); }, 400);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('final-score').innerText = score;
            
            let title = "";
            let comment = "";
            let theme = { bg: "bg-slate-100", text: "text-slate-600" };

            if (score === 0) {
                title = "손가락 압수! ✋";
                comment = "0점이라니... <br>감점 150점의 매운맛을 보셨군요? <br>정확도가 생명입니다!";
                theme = { bg: "bg-red-50", text: "text-red-700" };
            } else if (score < 400) {
                title = "지수 유치원생 🐥";
                comment = "한 번 틀릴 때마다 점수가 <br>삭제되는 마법! <br>신중하게 다시 해보세요.";
                theme = { bg: "bg-orange-50", text: "text-orange-800" };
            } else if (score < 1000) {
                title = "평범한 지구인 🌍";
                comment = "딱 평균이네요. <br>어디 가서 수학 잘한다는 소리는 <br>주변 눈치 보고 하세요!";
                theme = { bg: "bg-yellow-50", text: "text-yellow-800" };
            } else if (score < 1600) {
                title = "학원가 유망주 😎";
                comment = "오~ 암산 속도가 상당합니다! <br>조금만 더 속도를 내면 <br>천계의 영역에 도달할 수 있어요.";
                theme = { bg: "bg-blue-50", text: "text-blue-700" };
            } else if (score < 2500) {
                title = "인간 계산기 (초고득점자) 🤖";
                comment = "1600점 돌파! <br>감점 리스크를 뚫고 올라온 <br>당신은 진정한 연산 머신!";
                theme = { bg: "bg-purple-50", text: "text-purple-700" };
            } else {
                title = "수학의 신 (God Mode) 👑";
                comment = "이 점수가 가능하긴 한가요? <br>단 한 번의 실수도 허용하지 않은 <br>완벽한 마스터의 탄생!";
                theme = { bg: "bg-indigo-100", text: "text-indigo-800" };
            }
            
            const fbEl = document.getElementById('feedback');
            document.getElementById('result-title').innerText = title;
            fbEl.innerHTML = comment;
            fbEl.className = `mb-6 p-4 rounded-2xl text-sm leading-relaxed font-bold ${theme.bg} ${theme.text}`;
            
            showScreen('result');
        }

        // --- Ranking Logic ---

        function saveScore() {
            const nickname = document.getElementById('nickname').value.trim();
            const btn = document.getElementById('save-btn');

            if (!nickname) {
                customAlert("닉네임을 입력해주세요!");
                return;
            }

            // 비속어 필터링
            for (let word of badWords) {
                if (nickname.includes(word)) {
                    customAlert("닉네임에 부적절한 단어가 포함되어 있습니다.");
                    return;
                }
            }

            let rankings = JSON.parse(localStorage.getItem('monomial_rankings') || '[]');
            rankings.push({ name: nickname, score: score, date: new Date().toLocaleDateString() });
            rankings.sort((a, b) => b.score - a.score);
            rankings = rankings.slice(0, 10); // TOP 10만 유지

            localStorage.setItem('monomial_rankings', JSON.stringify(rankings));
            
            btn.disabled = true;
            btn.innerText = "등록 완료!";
            btn.className = "w-full py-3 bg-slate-300 text-white rounded-2xl font-bold cursor-not-allowed";
            
            setTimeout(showRanking, 800);
        }

        function showRanking() {
            const list = document.getElementById('ranking-list');
            const rankings = JSON.parse(localStorage.getItem('monomial_rankings') || '[]');
            
            list.innerHTML = rankings.length === 0 
                ? '<div class="text-center text-slate-400 py-10">아직 등록된 랭킹이 없습니다.</div>' 
                : rankings.map((item, index) => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-4">
                            <span class="w-6 text-center font-bold ${index < 3 ? 'text-indigo-600' : 'text-slate-400'}">${index + 1}</span>
                            <span class="font-bold text-slate-700">${item.name}</span>
                        </div>
                        <div class="text-right">
                            <div class="font-black text-indigo-600">${item.score}</div>
                            <div class="text-[10px] text-slate-400">${item.date}</div>
                        </div>
                    </div>
                `).join('');
            
            showScreen('ranking');
        }

        function adminReset() {
            const pw = prompt("관리자 비밀번호를 입력하세요:");
            if (pw === "4924") {
                if (confirm("모든 랭킹 데이터를 초기화하시겠습니까?")) {
                    localStorage.removeItem('monomial_rankings');
                    showRanking();
                }
            } else if (pw !== null) {
                customAlert("비밀번호가 틀렸습니다.");
            }
        }

        function customAlert(msg) {
            // Simple replacement for alert() in iframe
            const alertDiv = document.createElement('div');
            alertDiv.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-50 animate-bounce";
            alertDiv.innerText = msg;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 2000);
        }
    </script>
</body>
</html>
