    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBhQdSrkl88ncTml483jZMhsQDz-YkIh4g",
            authDomain: "jisu-ac55a.firebaseapp.com",
            projectId: "jisu-ac55a",
            storageBucket: "jisu-ac55a.firebasestorage.app",
            messagingSenderId: "722895024771",
            appId: "1:722895024771:web:730aa9e81d335154ffa1b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rankingCol = collection(db, "rankings");

        // --- Game Logic ---
        let score = 0;
        let timeLeft = 50;
        let timerInterval;
        let currentAnswer = "";
        let isProcessing = false;
        const badWords = ["바보", "멍청이", "시발", "개새", "끼", "니미", "미친", "지랄", "좆", "븅신", "섹스", "섹", "패드립"];

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen'),
            ranking: document.getElementById('ranking-screen')
        };

        window.showScreen = (screenName) => {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        function formatMonomial(coeff, expX, expY = 0) {
            let res = "";
            if (coeff === 1) {
                if (expX === 0 && expY === 0) res = "1";
            } else if (coeff === -1) {
                res = "-";
                if (expX === 0 && expY === 0) res = "-1";
            } else {
                res = coeff.toString();
            }
            if (expX > 0) {
                res += "x";
                if (expX > 1) res += `<sup>${expX}</sup>`;
            }
            if (expY > 0) {
                res += "y";
                if (expY > 1) res += `<sup>${expY}</sup>`;
            }
            return res;
        }

        window.startGame = () => {
            score = 0;
            timeLeft = 50;
            isProcessing = false;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('nickname').value = "";
            document.getElementById('save-btn').disabled = false;
            document.getElementById('save-btn').innerText = "랭킹 등록하기";
            document.getElementById('save-btn').className = "w-full py-3 bg-indigo-500 text-white rounded-2xl font-bold hover:bg-indigo-600 tap-effect";
            
            window.showScreen('game');
            nextQuestion();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame();
                }
                document.getElementById('timer').innerText = Math.max(0, Math.ceil(timeLeft));
                document.getElementById('progress').style.width = (timeLeft / 50 * 100) + "%";
            }, 100);
        };

        function nextQuestion() {
            isProcessing = false;
            const level = Math.floor(score / 350); 
            const useY = level >= 1;
            let qHtml = "", ans = { c: 1, x: 0, y: 0 };
            const type = level < 1 ? Math.floor(Math.random() * 2) : Math.floor(Math.random() * 3);

            if (type === 0) { // Multi
                let c1 = (Math.floor(Math.random() * 6) + 1) * (Math.random() > 0.5 ? 1 : -1);
                let x1 = Math.floor(Math.random() * 3) + 1;
                let y1 = useY ? Math.floor(Math.random() * 3) : 0;
                let c2 = Math.floor(Math.random() * 4) + 1, x2 = Math.floor(Math.random() * 3) + 1, y2 = useY ? Math.floor(Math.random() * 3) : 0;
                qHtml = `${formatMonomial(c1, x1, y1)} <span class="op-box">×</span> ${formatMonomial(c2, x2, y2)}`;
                ans = { c: c1 * c2, x: x1 + x2, y: y1 + y2 };
            } else if (type === 1) { // Div
                let c2 = Math.floor(Math.random() * 4) + 1, x2 = Math.floor(Math.random() * 3) + 1, y2 = useY ? Math.floor(Math.random() * 2) : 0;
                let resC = (Math.floor(Math.random() * 4) + 1) * (Math.random() > 0.5 ? 1 : -1), resX = Math.floor(Math.random() * 3), resY = useY ? Math.floor(Math.random() * 2) : 0;
                let c1 = c2 * resC, x1 = x2 + resX, y1 = y2 + resY;
                qHtml = `${formatMonomial(c1, x1, y1)} <span class="op-box">÷</span> ${formatMonomial(c2, x2, y2)}`;
                ans = { c: resC, x: resX, y: resY };
            } else { // Power
                let c = Math.floor(Math.random() * 3) + 2, x = Math.floor(Math.random() * 3) + 1, y = useY ? Math.floor(Math.random() * 2) + 1 : 0, p = Math.floor(Math.random() * 2) + 2; 
                qHtml = `(${formatMonomial(c, x, y)})<sup>${p}</sup>`;
                ans = { c: Math.pow(c, p), x: x * p, y: y * p };
            }

            currentAnswer = `${ans.c},${ans.x},${ans.y}`;
            let options = [{ key: currentAnswer, html: formatMonomial(ans.c, ans.x, ans.y) }];
            let optionKeys = new Set([currentAnswer]);

            while (options.length < 4) {
                let fc = ans.c, fx = ans.x, fy = ans.y;
                const roll = Math.random();
                if (roll < 0.3) { fx = Math.max(0, ans.x + (Math.random() > 0.5 ? 1 : -1)); if (useY) fy = Math.max(0, ans.y + (Math.random() > 0.5 ? 1 : -1)); }
                else if (roll < 0.6) { fc = -ans.c; }
                else if (roll < 0.8) { fc = ans.c + (Math.floor(Math.random() * 3) + 1) * (Math.random() > 0.5 ? 1 : -1); fx = Math.max(0, ans.x + 1); }
                else { fx = ans.x + 2; fc = ans.c; }
                if (fc === 0) fc = 3;
                let fKey = `${fc},${fx},${fy}`;
                if (!optionKeys.has(fKey)) { optionKeys.add(fKey); options.push({ key: fKey, html: formatMonomial(fc, fx, fy) }); }
            }

            document.getElementById('question-area').innerHTML = qHtml;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 px-2 bg-white border-2 border-slate-200 rounded-2xl flex justify-center items-center gap-1 hover:border-indigo-400 hover:bg-indigo-50 tap-effect transition-all h-20 text-xl font-bold text-slate-700 math-expr";
                btn.innerHTML = opt.html;
                btn.onclick = () => checkAnswer(opt.key, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selectedKey, btn) {
            if (isProcessing) return;
            if (selectedKey === currentAnswer) {
                isProcessing = true;
                score += 100;
                document.getElementById('score').innerText = score;
                btn.classList.replace('border-slate-200', 'border-green-500');
                btn.classList.add('bg-green-50', 'text-green-700');
                setTimeout(nextQuestion, 200);
            } else {
                score = Math.max(0, score - 150);
                document.getElementById('score').innerText = score;
                btn.classList.replace('border-slate-200', 'border-red-500');
                btn.classList.add('bg-red-50', 'text-red-700', 'shake');
                setTimeout(() => { btn.classList.remove('shake'); }, 400);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('final-score').innerText = score;

            else if (score < 400) { title = "지수 유치원생 🐥"; comment = "감점이 무겁죠? 신중하게 다시 해보세요."; theme = { bg: "bg-orange-50", text: "text-orange-800" }; }
            else if (score < 1000) { title = "평범한 지구인 🌍"; comment = "딱 평균이네요. 덜렁대는 습관을 고칩시다!"; theme = { bg: "bg-yellow-50", text: "text-yellow-800" }; }
            else if (score < 1600) { title = "학원가 유망주 😎"; comment = "오~ 조금만 더 버티면 마스터입니다."; theme = { bg: "bg-blue-50", text: "text-blue-700" }; }
            else if (score < 2500) { title = "인간 계산기 (초고득점자) 🤖"; comment = "1600점 돌파! 당신은 진정한 연산 머신!"; theme = { bg: "bg-purple-50", text: "text-purple-700" }; }
            else { title = "수학의 신 (God Mode) 👑"; comment = "완벽한 마스터의 탄생! 경배하라!"; theme = { bg: "bg-indigo-100", text: "text-indigo-800" }; }
            const fbEl = document.getElementById('feedback');
            document.getElementById('result-title').innerText = title;
            fbEl.innerHTML = comment;
            fbEl.className = `mb-6 p-4 rounded-2xl text-sm leading-relaxed font-bold ${theme.bg} ${theme.text}`;
            window.showScreen('result');
        }

        // --- Firebase Ranking Logic ---
        window.saveScore = async () => {
            const nickname = document.getElementById('nickname').value.trim();
            const btn = document.getElementById('save-btn');
            if (!nickname) { showToast("닉네임을 입력해주세요!"); return; }
            for (let word of badWords) { if (nickname.includes(word)) { showToast("부적절한 단어가 포함되었습니다."); return; } }
            
            btn.disabled = true;
            btn.innerText = "저장 중...";
            
            try {
                await addDoc(rankingCol, {
                    name: nickname,
                    score: score,
                    createdAt: serverTimestamp()
                });
                btn.innerText = "등록 완료!";
                btn.className = "w-full py-3 bg-slate-300 text-white rounded-2xl font-bold cursor-not-allowed";
                setTimeout(window.showRanking, 800);
            } catch (e) {
                console.error("Error saving score: ", e);
                showToast("저장 실패. 잠시 후 다시 시도하세요.");
                btn.disabled = false;
                btn.innerText = "등록 실패 (재시도)";
            }
        };

        window.showRanking = async () => {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '<div class="text-center text-slate-400 py-10 animate-pulse">데이터 불러오는 중...</div>';
            window.showScreen('ranking');

            try {
                const q = query(rankingCol, orderBy("score", "desc"), limit(10));
                const querySnapshot = await getDocs(q);
                let html = "";
                let index = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) : "";
                    html += `
                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div class="flex items-center gap-4">
                                <span class="w-6 text-center font-bold ${index <= 3 ? 'text-indigo-600' : 'text-slate-400'}">${index}</span>
                                <span class="font-bold text-slate-700">${data.name}</span>
                            </div>
                            <div class="text-right">
                                <div class="font-black text-indigo-600">${data.score}</div>
                                <div class="text-[10px] text-slate-400">${dateStr}</div>
                            </div>
                        </div>`;
                    index++;
                });
                list.innerHTML = html || '<div class="text-center text-slate-400 py-10">첫 랭커가 되어보세요!</div>';
            } catch (e) {
                console.error("Error loading rankings: ", e);
                list.innerHTML = '<div class="text-center text-red-400 py-10">랭킹을 불러올 수 없습니다.</div>';
            }
        };

        window.adminReset = async () => {
            const pw = prompt("관리자 비밀번호:");
            if (pw === "4924") {
                if (confirm("모든 데이터를 영구 삭제합니까?")) {
                    const qSnapshot = await getDocs(rankingCol);
                    const deletePromises = [];
                    qSnapshot.forEach((d) => { deletePromises.push(deleteDoc(doc(db, "rankings", d.id))); });
                    await Promise.all(deletePromises);
                    showToast("랭킹이 초기화되었습니다.");
                    window.showRanking();
                }
            } else if (pw !== null) { showToast("비밀번호 불일치"); }
        };
    </script>
